worker_processes auto;

error_log  C:/Users/arman/OneDrive/Desktop/edge-core-iptv-v2/logs/nginx_error.log warn;
pid        C:/Users/arman/OneDrive/Desktop/edge-core-iptv-v2/nginx/logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       C:/nginx/conf/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    server_tokens off;
    client_max_body_size 20m;

    access_log C:/Users/arman/OneDrive/Desktop/edge-core-iptv-v2/logs/nginx_access.log;

    include C:/Users/arman/OneDrive/Desktop/edge-core-iptv-v2/nginx/conf.d/*.conf;
}
server {
    listen 5001;
    server_name _;

    charset utf-8;

    location = /health {
        proxy_pass http://127.0.0.1:5010/health;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = / {
        default_type application/json;
        return 200 '{"ok":true,"service":"edge-core-iptv-v2-nginx","status":"online"}';
    }

    # Proxy dinamico desde el origin
    # Ejemplo:
    # /proxy/1480473495.ts
    location ~ ^/proxy/([0-9]+)\.ts$ {
        proxy_pass http://10.254.1.100:4001/proxy/$1.ts;

        proxy_http_version 1.1;
        proxy_set_header Host 10.254.1.100:4001;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_buffering off;
        proxy_request_buffering off;

        default_type video/mp2t;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
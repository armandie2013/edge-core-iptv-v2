proxy_cache_path /var/cache/nginx/iptv
    levels=1:2
    keys_zone=iptv_cache:200m
    max_size=30g
    inactive=30m
    use_temp_path=off;

log_format edge_iptv '$time_iso8601|$remote_addr|$request_method|$uri|$status|$body_bytes_sent|$request_time|$upstream_addr|$upstream_status|$upstream_cache_status|$http_user_agent';

server {
    listen 5001;
    server_name _;

    charset utf-8;

    access_log /var/log/nginx/edge_access.log edge_iptv;
    error_log /var/log/nginx/edge_error.log warn;

    location = /health {
        proxy_pass http://127.0.0.1:5010/health;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /panel {
        proxy_pass http://127.0.0.1:5010/panel;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = / {
        proxy_pass http://127.0.0.1:5010/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # IMPORTANTE:
    # Ahora /proxy/*.ts NO va directo al Origin.
    # Va a la app Edge :5010, donde el Relay Manager mantiene
    # una sola conexión al Origin por canal activo.
    location ~ ^/proxy/([0-9]+)\.ts$ {
        proxy_pass http://127.0.0.1:5010/proxy/$1.ts;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Para streams largos
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        # No bufferizar streams en vivo
        proxy_buffering off;
        proxy_request_buffering off;

        # Reservado para cuando usemos caché real de HLS/segmentos.
        # En TS continuo no se usa como mecanismo principal.
        # proxy_cache iptv_cache;

        default_type video/mp2t;

        add_header X-Edge-Node "EDGE-ANCASTI-01" always;
        add_header X-Edge-Mode "relay" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}